<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TA Admin Task Board — CAMT</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "Sukhumvit Set", "IBM Plex Sans Thai", "Noto Sans Thai", BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; background: #F5F4F0; color: #1a1a18; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 860px; margin: 0 auto; }
    .header { margin-bottom: 2rem; }
    .header h1 { font-size: 22px; font-weight: 600; color: #1a1a18; }
    .header p { font-size: 13px; color: #888780; margin-top: 4px; }
    .last-updated { font-size: 12px; color: #B4B2A9; margin-top: 6px; }
    .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 2rem; }
    .stat { background: #fff; border: 0.5px solid #D3D1C7; border-radius: 10px; padding: 14px 16px; }
    .stat-label { font-size: 12px; color: #888780; margin-bottom: 4px; }
    .stat-number { font-size: 24px; font-weight: 600; color: #1a1a18; }
    .stat.highlight .stat-number { color: #705BE6; }
    /* ===== Palette (จากภาพ infographic): ส้ม / เขียวมรกต / ม่วง ===== */
    .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 1.5rem; }
    .filter-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filter-divider { width: 1px; align-self: stretch; min-height: 24px; background: #D3D1C7; margin: 0 2px; }
    .filter-btn { display: inline-flex; align-items: center; font-size: 12px; font-weight: 500; padding: 5px 14px; border-radius: 20px; border: 0.5px solid #D3D1C7; background: #fff; color: #5F5E5A; cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { background: #F1EFE8; }
    .filter-btn.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
    .count-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; padding: 0 5px; margin-left: 7px; border-radius: 9px; font-size: 10px; font-weight: 700; background: #E5E3DB; color: #5F5E5A; }
    /* สีประจำหมวดบนปุ่มฟิลเตอร์ */
    .cat-filter.emp .count-badge   { background: #FBE6D2; color: #C2671B; }
    .cat-filter.maint .count-badge { background: #E7E3FB; color: #4B3BC9; }
    .cat-filter.meet .count-badge  { background: #D2F1EC; color: #0E7C70; }
    .cat-filter.emp.active   { background: #F2994A; border-color: #F2994A; color: #fff; }
    .cat-filter.maint.active { background: #705BE6; border-color: #705BE6; color: #fff; }
    .cat-filter.meet.active  { background: #16B8A6; border-color: #16B8A6; color: #fff; }
    .filter-btn.active .count-badge { background: rgba(255,255,255,0.28); color: #fff; }
    .category-section { margin-bottom: 2rem; }
    .category-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .category-pill { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.07em; }
    .cat-employment { background: #FBE6D2; color: #C2671B; }
    .cat-maintenance { background: #E7E3FB; color: #4B3BC9; }
    .cat-meeting { background: #D2F1EC; color: #0E7C70; }
    .category-count { font-size: 12px; color: #B4B2A9; }
    .status-group-label { font-size: 11px; color: #B4B2A9; text-transform: uppercase; letter-spacing: 0.07em; margin: 14px 0 8px; }
    .task-card { background: #fff; border: 0.5px solid #D3D1C7; border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; transition: box-shadow 0.15s; }
    .task-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .task-card.is-done { opacity: 0.55; }
    .task-card.is-meeting { border-left: 3px solid #16B8A6; border-radius: 0 12px 12px 0; }
    .task-num { font-size: 11px; color: #B4B2A9; margin-bottom: 3px; }
    .task-title { font-size: 14px; font-weight: 600; color: #1a1a18; line-height: 1.4; }
    .task-title.done-title { text-decoration: line-through; color: #888780; }
    .task-desc { font-size: 13px; color: #5F5E5A; margin-top: 6px; line-height: 1.55; }
    .task-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
    .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 6px; }
    .badge-todo { background: #FBE6D2; color: #C2671B; }
    .badge-done { background: #D2F1EC; color: #0E7C70; }
    .badge-meeting { background: #ECDDFB; color: #6B30A8; }
    .due-badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 6px; background: #E7E3FB; color: #4B3BC9; }
    .location-badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 6px; background: #F1EFE8; color: #5F5E5A; }
    .no-due { font-size: 11px; color: #B4B2A9; }
    .section-divider { border: none; border-top: 0.5px solid #D3D1C7; margin: 1.5rem 0; }
    .footer { text-align: center; font-size: 12px; color: #B4B2A9; margin-top: 3rem; padding-top: 1.5rem; border-top: 0.5px solid #D3D1C7; }
    .hidden { display: none !important; }
    .task-card { position: relative; }
    .task-title { padding-right: 66px; }
    .task-check { position: absolute; top: 14px; right: 16px; width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid #C9C7BD; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; transition: all 0.15s; }
    .task-check:hover { border-color: #705BE6; }
    .task-check.checked { background: #16B8A6; border-color: #16B8A6; }
    .task-check svg { width: 13px; height: 13px; stroke: #fff; }
    .task-edit { position: absolute; top: 14px; right: 46px; width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid #C9C7BD; background: #fff; color: #5F5E5A; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; line-height: 1; transition: all 0.15s; }
    .task-edit:hover { border-color: #705BE6; background: #EEEBFB; color: #705BE6; }
    .task-edit svg { width: 13px; height: 13px; stroke: currentColor; }
    .board-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 1.25rem; }
    .action-btn { font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 8px; border: 0.5px solid #D3D1C7; background: #fff; color: #5F5E5A; cursor: pointer; transition: all 0.15s; }
    .action-btn:hover { background: #F1EFE8; }
    .action-btn.primary { background: #705BE6; color: #fff; border-color: #705BE6; }
    .action-btn.primary:hover { background: #5B47C9; }
    .action-btn.danger { color: #EB5757; border-color: #F3C9C9; }
    .action-btn.danger:hover { background: #FCEDED; }
    .add-btn { background: #705BE6; color: #fff; border-color: #705BE6; }
    .add-btn:hover { background: #5B47C9; }
    .save-note { font-size: 12px; color: #B4B2A9; }
    .save-note.dirty { color: #633806; }
    .export-btn { margin-left: auto; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(26,26,24,0.45); display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 100; }
    .modal { background: #fff; border-radius: 16px; padding: 22px 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
    .modal label { display: block; font-size: 12px; color: #5F5E5A; font-weight: 500; margin-bottom: 12px; }
    .modal input, .modal select, .modal textarea { width: 100%; margin-top: 4px; padding: 8px 10px; font-size: 13px; font-family: inherit; border: 0.5px solid #D3D1C7; border-radius: 8px; background: #fff; color: #1a1a18; }
    .modal textarea { min-height: 70px; resize: vertical; }
    .modal input:focus, .modal select:focus, .modal textarea:focus { outline: none; border-color: #705BE6; }
    .modal-row { display: flex; gap: 10px; }
    .modal-row label { flex: 1; }
    .modal-actions { display: flex; gap: 8px; align-items: center; margin-top: 18px; }
    @media (max-width: 600px) { .summary { grid-template-columns: repeat(2, 1fr); } .header h1 { font-size: 18px; } .save-note { width: 100%; } .modal-row { flex-direction: column; gap: 0; } }
  </style>
</head>
<body>
<div class="container">

  <p style="margin-bottom:1rem;"><a href="../index.html" style="font-size:13px;color:#705BE6;text-decoration:none;">← หน้าหลัก / Home</a></p>

  <div class="header">
    <h1>TA Admin Task Board</h1>
    <p>Teaching Assistants Employment Process — College of Arts, Media and Technology, CMU</p>
    <p class="last-updated">Last updated: Jun 15, 2026</p>
  </div>

  <div class="summary">
    <div class="stat"><div class="stat-label">Total tasks</div><div class="stat-number" id="count-total">—</div></div>
    <div class="stat highlight"><div class="stat-label">To do</div><div class="stat-number" id="count-todo">—</div></div>
    <div class="stat"><div class="stat-label">Done</div><div class="stat-number" id="count-done">—</div></div>
    <div class="stat"><div class="stat-label">Has deadline</div><div class="stat-number" id="count-due">—</div></div>
  </div>

  <div class="filters">
    <div class="filter-group">
      <button class="filter-btn active" onclick="filterTasks('all', this)">All</button>
      <button class="filter-btn cat-filter emp" onclick="filterTasks('Employment Process', this)">Employment Process<span class="count-badge" id="fc-emp">0</span></button>
      <button class="filter-btn cat-filter maint" onclick="filterTasks('System Maintenance', this)">System Maintenance<span class="count-badge" id="fc-maint">0</span></button>
      <button class="filter-btn cat-filter meet" onclick="filterTasks('Meeting', this)">Meeting<span class="count-badge" id="fc-meet">0</span></button>
    </div>
    <span class="filter-divider"></span>
    <div class="filter-group">
      <button class="filter-btn" onclick="filterTasks('todo', this)">To Do</button>
      <button class="filter-btn" onclick="filterTasks('done', this)">Done</button>
      <button class="filter-btn" onclick="filterTasks('due', this)">Has Deadline</button>
    </div>
  </div>

  <div class="board-actions">
    <button class="action-btn add-btn" onclick="openAdd()">＋ Add a Task</button>
    <button class="action-btn" id="reset-btn" onclick="resetChanges()">↺ ล้างการเปลี่ยนแปลง</button>
    <span class="save-note" id="save-note"></span>
    <button class="action-btn export-btn" onclick="exportTasksJs()">💾 บันทึกไฟล์ offline</button>
  </div>

  <div id="task-board"></div>

  <div class="modal-overlay" id="modal" style="display:none">
    <div class="modal">
      <h3 id="modal-title">แก้ไขงาน</h3>
      <input type="hidden" id="f-id">
      <label>ชื่องาน
        <input id="f-title" placeholder="ชื่องาน">
      </label>
      <div class="modal-row">
        <label>หมวดหมู่
          <select id="f-category">
            <option value="Employment Process">Employment Process</option>
            <option value="System Maintenance">System Maintenance</option>
            <option value="Meeting">Meeting</option>
          </select>
        </label>
        <label>สถานะ
          <select id="f-status">
            <option value="todo">To Do</option>
            <option value="done">Done</option>
          </select>
        </label>
      </div>
      <div class="modal-row">
        <label>กำหนดส่ง / วันที่
          <input type="date" id="f-due">
        </label>
        <label>เวลา (ถ้ามี)
          <input type="time" id="f-time">
        </label>
      </div>
      <label>สถานที่ (ถ้ามี)
        <input id="f-location" placeholder="เช่น ห้อง 315">
      </label>
      <label>รายละเอียด
        <textarea id="f-desc" placeholder="รายละเอียดงาน"></textarea>
      </label>
      <div class="modal-actions">
        <button class="action-btn danger" id="btn-delete" onclick="deleteCurrent()">🗑 ลบงานนี้</button>
        <span style="flex:1"></span>
        <button class="action-btn" onclick="closeModal()">ยกเลิก</button>
        <button class="action-btn primary" onclick="saveModal()">บันทึก</button>
      </div>
    </div>
  </div>

  <div class="footer">CAMT — Teaching Assistants Employment Process &nbsp;·&nbsp; Last updated Jun 15, 2026</div>
</div>

<script src="tasks.js"></script>
<script>
  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function slugify(str) {
    return str.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
  }

  function renderBoard(tasks) {
    const board = document.getElementById('task-board');
    board.innerHTML = '';
    const catOrder = ['Employment Process', 'System Maintenance', 'Meeting'];
    const allCats = [...new Set(tasks.map(t => t.category))];
    const ordered = catOrder.filter(c => allCats.includes(c)).concat(allCats.filter(c => !catOrder.includes(c)));
    const pillClassMap = { 'Employment Process': 'cat-employment', 'System Maintenance': 'cat-maintenance', 'Meeting': 'cat-meeting' };

    ordered.forEach((cat, idx) => {
      const catTasks = tasks.filter(t => t.category === cat);
      const catId = 'cat-' + slugify(cat);
      const pillClass = pillClassMap[cat] || 'cat-employment';
      const section = document.createElement('div');
      section.className = 'category-section';
      section.id = catId;
      section.innerHTML = `<div class="category-header"><span class="category-pill ${pillClass}">${cat}</span><span class="category-count">${catTasks.length} task${catTasks.length !== 1 ? 's' : ''}</span></div>`;

      ['todo', 'done'].forEach(status => {
        const grouped = catTasks.filter(t => t.status === status);
        if (!grouped.length) return;
        const label = document.createElement('div');
        label.className = 'status-group-label';
        label.textContent = status === 'todo' ? 'To Do' : 'Done';
        section.appendChild(label);

        grouped.forEach(task => {
          const isMeeting = task.category === 'Meeting' || task.type === 'meeting';
          const isDone = task.status === 'done';
          const card = document.createElement('div');
          card.className = `task-card${isDone ? ' is-done' : ''}${isMeeting ? ' is-meeting' : ''}`;
          card.dataset.category = task.category;
          card.dataset.status = task.status;
          card.dataset.due = task.due_date || 'none';
          card.dataset.type = task.type || 'task';

          const statusBadge = isDone ? `<span class="badge badge-done">Done</span>` : `<span class="badge badge-todo">To Do</span>`;
          const meetingBadge = '';
          const duePart = task.due_date
            ? `<span class="due-badge">${task.time ? formatDate(task.due_date) + ' · ' + task.time : 'Due ' + formatDate(task.due_date)}</span>`
            : `<span class="no-due">No due date</span>`;
          const locationPart = task.location ? `<span class="location-badge">${task.location}</span>` : '';

          const checkIcon = isDone ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>' : '';
          card.innerHTML = `
            <button class="task-edit" onclick="openEdit(${task.id})" title="แก้ไขงาน" aria-label="edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg></button>
            <button class="task-check${isDone ? ' checked' : ''}" onclick="toggleStatus(${task.id})" title="${isDone ? 'เปลี่ยนเป็น To Do' : 'ทำเครื่องหมายว่าเสร็จ'}" aria-label="toggle status">${checkIcon}</button>
            <div class="task-num">#${task.id}</div>
            <div class="task-title${isDone ? ' done-title' : ''}">${task.title}</div>
            ${task.description ? `<div class="task-desc">${task.description}</div>` : ''}
            <div class="task-meta">${statusBadge}${meetingBadge}${duePart}${locationPart}</div>`;
          section.appendChild(card);
        });
      });

      board.appendChild(section);
      if (idx < ordered.length - 1) {
        const hr = document.createElement('hr');
        hr.className = 'section-divider';
        board.appendChild(hr);
      }
    });

    document.getElementById('count-total').textContent = tasks.length;
    document.getElementById('count-todo').textContent = tasks.filter(t => t.status === 'todo').length;
    document.getElementById('count-done').textContent = tasks.filter(t => t.status === 'done').length;
    document.getElementById('count-due').textContent = tasks.filter(t => t.due_date).length;

    document.getElementById('fc-emp').textContent = tasks.filter(t => t.category === 'Employment Process').length;
    document.getElementById('fc-maint').textContent = tasks.filter(t => t.category === 'System Maintenance').length;
    document.getElementById('fc-meet').textContent = tasks.filter(t => t.category === 'Meeting').length;
  }

  function filterTasks(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = type;
    applyFilter(type);
  }

  function applyFilter(type) {
    document.querySelectorAll('.task-card').forEach(card => {
      const cat = card.dataset.category, status = card.dataset.status, due = card.dataset.due, dtype = card.dataset.type;
      let show = type === 'all' || (type === 'todo' && status === 'todo') || (type === 'done' && status === 'done') || (type === 'due' && due !== 'none') || (type === 'meeting' && dtype === 'meeting') || cat === type;
      card.classList.toggle('hidden', !show);
    });
    document.querySelectorAll('.category-section').forEach(s => {
      s.classList.toggle('hidden', s.querySelectorAll('.task-card:not(.hidden)').length === 0);
    });
    document.querySelectorAll('.status-group-label').forEach(label => {
      const cards = [];
      let el = label.nextElementSibling;
      while (el && el.classList.contains('task-card')) { cards.push(el); el = el.nextElementSibling; }
      label.classList.toggle('hidden', !cards.some(c => !c.classList.contains('hidden')));
    });
    document.querySelectorAll('.section-divider').forEach(d => {
      const prev = d.previousElementSibling, next = d.nextElementSibling;
      d.classList.toggle('hidden', (!prev || prev.classList.contains('hidden')) || (!next || next.classList.contains('hidden')));
    });
  }

  // ============================================================
  //  CONFIG — วาง URL ของ Google Apps Script Web App ตรงนี้
  //  (ดูวิธีในไฟล์ SETUP-Google-Sheets.md) ถ้าเว้นว่าง = โหมดออฟไลน์
  //  ใช้ข้อมูลจาก tasks.js + บันทึกในเบราว์เซอร์
  const API_URL = 'https://script.google.com/macros/s/AKfycbxO5iVtCKbh006nys3yEWP_bO_gH_24qW_vPaaXMfejVwZw2fGDQv2SV4NsnAtqnO2EXA/exec';
  const AUTO_REFRESH_MS = 15000;   // ดึงการเปลี่ยนแปลงของคนอื่นทุก 15 วินาที
  // ============================================================

  const OFFLINE_KEY = 'ta-tasks-offline';   // เก็บข้อมูลทั้งชุดเมื่อทำงานออฟไลน์
  let tasks = [];
  let currentFilter = 'all';
  let online = false;
  let writing = false;
  let editingId = null;

  const CATEGORIES = ['Employment Process', 'System Maintenance', 'Meeting'];

  // ทำให้เวลาแสดงผลอ่านง่ายเสมอ: ถ้าเป็น ISO datetime (จาก Google Sheets) แปลงเป็น HH:MM
  function cleanTime(v) {
    if (!v) return '';
    const s = String(v).trim();
    if (/\d{4}-\d{2}-\d{2}T/.test(s)) {
      const d = new Date(s);
      if (!isNaN(d)) return ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
    }
    return s;   // เช่น "13:30" หรือ "10:00 AM"
  }

  function normalizeOne(t) {
    let category = String(t.category || 'Employment Process');
    const legacyType = String(t.type || 'task');
    // รวม category + type: ของเดิมที่ type=meeting ให้ถือเป็นหมวด Meeting
    if (legacyType === 'meeting') category = 'Meeting';
    if (CATEGORIES.indexOf(category) < 0) category = 'Employment Process';
    return {
      id: Number(t.id),
      title: String(t.title || ''),
      category: category,
      status: (String(t.status).toLowerCase() === 'done') ? 'done' : 'todo',
      type: category === 'Meeting' ? 'meeting' : 'task',   // type ผูกกับ category อัตโนมัติ
      due_date: t.due_date ? String(t.due_date) : '',
      time: cleanTime(t.time),
      location: t.location ? String(t.location) : '',
      description: String(t.description || '')
    };
  }

  // แปลงเวลาเป็น HH:MM (24 ชม.) สำหรับช่อง <input type="time">
  function to24h(timeStr) {
    if (!timeStr) return '';
    const m = String(timeStr).trim().match(/^(\d{1,2})[:.](\d{2})\s*(AM|PM|am|pm)?$/);
    if (!m) return '';
    let hh = Number(m[1]); const mm = m[2]; const ap = m[3];
    if (ap) { const u = ap.toUpperCase(); if (u === 'PM' && hh < 12) hh += 12; if (u === 'AM' && hh === 12) hh = 0; }
    return (hh < 10 ? '0' + hh : '' + hh) + ':' + mm;
  }
  function normalize(arr) { return arr.map(normalizeOne).sort((a, b) => a.id - b.id); }

  // ---- offline persistence: full snapshot ----
  function loadOfflineSnapshot() {
    try { const s = JSON.parse(localStorage.getItem(OFFLINE_KEY)); return Array.isArray(s) ? s : null; }
    catch (e) { return null; }
  }
  function saveOfflineSnapshot() { localStorage.setItem(OFFLINE_KEY, JSON.stringify(tasks)); }

  function fromFile() {
    const snap = loadOfflineSnapshot();
    return normalize(snap || TASKS.map(x => ({ ...x })));
  }

  function nextId() {
    return tasks.reduce((m, t) => Math.max(m, Number(t.id) || 0), 0) + 1;
  }

  // ---- API helpers ----
  async function apiGet() {
    const res = await fetch(API_URL, { method: 'GET' });
    const data = await res.json();
    if (!data.ok) throw new Error('bad response');
    return normalize(data.tasks);
  }
  async function apiPost(payload) {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'request failed');
    return data;
  }

  async function loadTasks() {
    if (API_URL) {
      try { tasks = await apiGet(); online = true; }
      catch (e) { tasks = fromFile(); online = false; }
    } else {
      tasks = fromFile(); online = false;
    }
    render();
  }

  // ---- mutations (work in both online and offline modes) ----
  async function toggleStatus(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    const newStatus = t.status === 'done' ? 'todo' : 'done';
    t.status = newStatus;          // optimistic update
    render();
    if (API_URL) {
      writing = true;
      try { await apiPost({ action: 'update', id: id, status: newStatus }); online = true; updateSaveNote(); }
      catch (e) {
        t.status = newStatus === 'done' ? 'todo' : 'done';   // revert
        online = false; render();
        alert('บันทึกไม่สำเร็จ — ตรวจสอบการเชื่อมต่อหรือ URL ของ Apps Script');
      } finally { writing = false; }
    } else {
      saveOfflineSnapshot(); updateSaveNote();
    }
  }

  async function persistAdd(task) {
    if (API_URL) {
      writing = true;
      try { await apiPost(Object.assign({ action: 'add' }, task)); await loadTasks(); }
      finally { writing = false; }
    } else {
      task.id = nextId();
      tasks.push(normalizeOne(task));
      saveOfflineSnapshot(); render();
    }
  }

  async function persistUpdate(task) {
    if (API_URL) {
      writing = true;
      try { await apiPost(Object.assign({ action: 'update' }, task)); await loadTasks(); }
      finally { writing = false; }
    } else {
      const i = tasks.findIndex(t => t.id === task.id);
      if (i >= 0) tasks[i] = normalizeOne(task);
      saveOfflineSnapshot(); render();
    }
  }

  async function persistDelete(id) {
    if (API_URL) {
      writing = true;
      try { await apiPost({ action: 'delete', id: id }); await loadTasks(); }
      finally { writing = false; }
    } else {
      tasks = tasks.filter(t => t.id !== id);
      saveOfflineSnapshot(); render();
    }
  }

  // ---- modal (add / edit / delete) ----
  function openAdd() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'เพิ่มงานใหม่';
    document.getElementById('f-id').value = '';
    document.getElementById('f-title').value = '';
    document.getElementById('f-category').value = 'Employment Process';
    document.getElementById('f-status').value = 'todo';
    document.getElementById('f-due').value = '';
    document.getElementById('f-time').value = '';
    document.getElementById('f-location').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('btn-delete').style.display = 'none';
    document.getElementById('modal').style.display = 'flex';
  }

  function openEdit(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'แก้ไขงาน #' + id;
    document.getElementById('f-id').value = id;
    document.getElementById('f-title').value = t.title;
    document.getElementById('f-category').value = t.category || 'Employment Process';
    document.getElementById('f-status').value = t.status;
    document.getElementById('f-due').value = t.due_date || '';
    document.getElementById('f-time').value = to24h(t.time);
    document.getElementById('f-location').value = t.location || '';
    document.getElementById('f-desc').value = t.description || '';
    document.getElementById('btn-delete').style.display = 'inline-block';
    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  function readForm() {
    const category = document.getElementById('f-category').value;
    return {
      title: document.getElementById('f-title').value.trim(),
      category: category,
      type: category === 'Meeting' ? 'meeting' : 'task',
      status: document.getElementById('f-status').value,
      due_date: document.getElementById('f-due').value,
      time: document.getElementById('f-time').value.trim(),
      location: document.getElementById('f-location').value.trim(),
      description: document.getElementById('f-desc').value.trim()
    };
  }

  async function saveModal() {
    const t = readForm();
    if (!t.title) { alert('กรุณากรอกชื่องาน'); return; }
    try {
      if (editingId == null) { await persistAdd(t); }
      else { t.id = editingId; await persistUpdate(t); }
      closeModal();
    } catch (e) {
      alert('บันทึกไม่สำเร็จ: ' + e.message);
    }
  }

  async function deleteCurrent() {
    if (editingId == null) return;
    if (!confirm('ลบงานนี้ออกอย่างถาวร?')) return;
    try { await persistDelete(editingId); closeModal(); }
    catch (e) { alert('ลบไม่สำเร็จ: ' + e.message); }
  }

  function updateSaveNote() {
    const note = document.getElementById('save-note');
    const resetBtn = document.getElementById('reset-btn');
    if (API_URL) {
      note.textContent = online
        ? '🟢 เชื่อมต่อ Google Sheets — บันทึกอัตโนมัติ'
        : '🔴 ออฟไลน์ — แสดงข้อมูลจากไฟล์ (การแก้จะไม่ถูกบันทึกขึ้น Sheets)';
      note.classList.toggle('dirty', !online);
      if (resetBtn) resetBtn.textContent = '↺ รีเฟรชจาก Sheets';
    } else {
      const dirty = loadOfflineSnapshot() != null;
      note.textContent = dirty
        ? '● แก้ไขในเบราว์เซอร์นี้ (ยังไม่ได้บันทึกลงไฟล์)'
        : 'ตรงกับไฟล์ tasks.js';
      note.classList.toggle('dirty', dirty);
      if (resetBtn) resetBtn.textContent = '↺ ล้างการเปลี่ยนแปลง';
    }
  }

  function render() {
    renderBoard(tasks);
    applyFilter(currentFilter);
    updateSaveNote();
  }

  function exportTasksJs() {
    const header =
`// ============================================================
//  TA Task Board — Data File
//  Edit this file to update the website.
//  Fields: id, title, category, status, type, due_date, time, location, description
// ============================================================

`;
    const body = 'const TASKS = ' + JSON.stringify(tasks, null, 2) + ';\n';
    const blob = new Blob([header + body], { type: 'text/javascript' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'tasks.js';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function resetChanges() {
    if (API_URL) { loadTasks(); return; }   // โหมดออนไลน์ = รีเฟรชจาก Sheets
    if (!confirm('ล้างการเปลี่ยนแปลงทั้งหมดในเบราว์เซอร์นี้ และกลับไปใช้ค่าจากไฟล์ tasks.js?')) return;
    localStorage.removeItem(OFFLINE_KEY);
    tasks = fromFile();
    render();
  }

  // ปิด modal เมื่อคลิกพื้นหลัง
  document.getElementById('modal').addEventListener('click', function (e) {
    if (e.target === this) closeModal();
  });

  loadTasks();
  if (API_URL) setInterval(() => { if (!writing) loadTasks(); }, AUTO_REFRESH_MS);
</script>
</body>
</html>
